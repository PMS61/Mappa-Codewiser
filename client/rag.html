<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deterministic Task Generator</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0D1117;
            color: #E6EDF3;
            font-family: 'DM Sans', sans-serif;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #21262D;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #30363D;
        }

        @keyframes pgbar {

            0%,
            100% {
                width: 15%;
                margin-left: 0
            }

            50% {
                width: 55%;
                margin-left: 22%
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-12px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
                transform: translateY(-8px);
            }
        }

        @keyframes pulse-border {

            0%,
            100% {
                border-color: #30363D
            }

            50% {
                border-color: #F0A500
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0
            }

            100% {
                background-position: 200% 0
            }
        }

        .fade-up {
            animation: fadeUp 0.3s ease both;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        /* ═══════════════════════════════════════════════════════════════════════════════
           RULES ENGINE — unchanged logic from original
           ═══════════════════════════════════════════════════════════════════════════════ */

        const TYPE_RULES = [
            { pattern: /theorem|proof|law|principle|concept|definition|what is|introduction|overview|fundamentals|theory|basis|foundation|understand/i, type: "Learning New Concept", mul: 1.4, durMins: 60, diffDelta: 0 },
            { pattern: /implement|code|build|write|program|algorithm|solve|exercise|problem|apply|construct|develop|create|design and|compute/i, type: "Problem Solving", mul: 1.3, durMins: 90, diffDelta: 1 },
            { pattern: /report|essay|summary|document|draft|write up|explain|describe|analysis|write a|prepare a/i, type: "Writing / Drafting", mul: 1.1, durMins: 75, diffDelta: 0 },
            { pattern: /revise|review|recap|practice problems|test yourself|quiz|re-read|consolidate|reinforce|go over/i, type: "Revision", mul: 0.9, durMins: 45, diffDelta: -1 },
            { pattern: /read|chapter|section|study|textbook|notes|material|reference|literature|go through/i, type: "Reading", mul: 0.8, durMins: 45, diffDelta: -1 },
        ];
        const DIFF_SIGNALS = [
            [/advanced|complex|optimis|dynamic programming|distributed|concurrent|recursive|asymptotic|proof|NP-hard|eigenvalue|gradient|backprop|derive/i, 2],
            [/implement|algorithm|analysis|design|architecture|protocol|schema|system/i, 1],
            [/basic|intro|simple|overview|introduction|what is|getting started|fundamentals|survey/i, -1],
        ];
        function classifyTopic(t) { for (const r of TYPE_RULES) if (r.pattern.test(t)) return r; return TYPE_RULES[0]; }
        function scoreDifficulty(t, p, total) { let s = 2; for (const [pat, d] of DIFF_SIGNALS) if (pat.test(t)) { s += d; break; } s += Math.floor((p / Math.max(1, total)) * 2); return Math.min(5, Math.max(1, s)); }
        function computeCL(d, m, dur) { const w = dur <= 30 ? 0.8 : dur <= 60 ? 1 : dur <= 90 ? 1.2 : 1.4; return parseFloat((d * m * w).toFixed(2)); }
        function parseDeadline(s) { const td = new Date(); td.setHours(0, 0, 0, 0); const m = s.match(/in\s+(\d+)\s+(day|week|month)/i); if (m) { const n = +m[1], u = m[2].toLowerCase(), d = new Date(td); if (u === "day") d.setDate(d.getDate() + n); if (u === "week") d.setDate(d.getDate() + n * 7); if (u === "month") d.setMonth(d.getMonth() + n); return d; } const p = new Date(s); if (!isNaN(p)) return p; const fb = new Date(td); fb.setDate(fb.getDate() + 14); return fb; }
        function fmtDate(d) { return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }); }
        function extractTopics(text) { const lines = text.split("\n").map(l => l.trim()).filter(Boolean); const topics = []; for (const line of lines) { const num = line.match(/^(\d+[\.\)]\d*[\.\)]?\s*)+(.+)/); if (num) { topics.push(num[num.length - 1].trim()); continue; } const bul = line.match(/^[-•*✦→]\s+(.+)/); if (bul) { topics.push(bul[1].trim()); continue; } if (line.length < 70 && !line.endsWith(".") && line.length > 5 && !/^[A-Z\s]{10,}$/.test(line)) topics.push(line); } return [...new Set(topics)].filter(t => t.length > 4); }
        function chunkText(text, size = 280) { const paras = text.split(/\n{2,}/).filter(p => p.trim().length > 20); const chunks = []; for (const p of paras) { if (p.length <= size) { chunks.push(p.trim()); continue; } const sents = p.split(/(?<=[.!?])\s+/); let cur = ""; for (const s of sents) { if (cur.length + s.length > size && cur) { chunks.push(cur.trim()); cur = s; } else cur += (cur ? " " : "") + s; } if (cur.trim()) chunks.push(cur.trim()); } return chunks.filter(c => c.length > 10); }
        function cosineSim(a, b) { let dot = 0, na = 0, nb = 0; for (let i = 0; i < a.length; i++) { dot += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; } return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-10); }
        function topK(q, cE, chunks, k = 10) { return cE.map((e, i) => ({ chunk: chunks[i], score: cosineSim(q, e), i })).sort((a, b) => b.score - a.score).slice(0, Math.min(k, chunks.length)); }
        function buildTasks(retrieved, topic, deadline, subject) { const fullText = retrieved.map(r => r.chunk).join("\n"); let topics = extractTopics(fullText); if (topics.length < 3) { topics = retrieved.map(r => { const fl = r.chunk.split("\n")[0].trim(); return fl.length < 80 ? fl : fl.slice(0, 65) + "…"; }); } if (!topics.some(t => /revise|review/i.test(t))) topics.push(`Revision: ${topic} — consolidate all key concepts`); if (!topics.some(t => /exercise|problem|implement/i.test(t))) topics.push(`Practice problems: ${topic} — mixed exercises`); topics = [...new Set(topics)].slice(0, 14); const today = new Date(); today.setHours(0, 0, 0, 0); const end = parseDeadline(deadline); const totalDays = Math.max(1, Math.floor((end - today) / 86400000)); const raw = topics.map((t, i) => { const cls = classifyTopic(t); const diff = Math.min(5, Math.max(1, scoreDifficulty(t, i, topics.length) + cls.diffDelta)); const cl = computeCL(diff, cls.mul, cls.durMins); const posRatio = i / topics.length; const priority = diff >= 4 ? "High" : (posRatio < 0.3 && cls.type === "Learning New Concept") ? "High" : totalDays <= 7 && posRatio < 0.5 ? "High" : cls.type === "Problem Solving" ? "Medium" : posRatio > 0.7 ? "Medium" : "Low"; return { name: t, subject: subject || topic, type: cls.type, duration: cls.durMins, difficulty: diff, cl, priority, deadline: "" }; }); const totalCL = raw.reduce((s, t) => s + t.cl, 0); let cum = 0; return raw.map(t => { cum += t.cl; const offset = Math.max(1, Math.floor((cum / Math.max(totalCL, 0.1)) * totalDays)); const d = new Date(today); d.setDate(today.getDate() + Math.min(offset, totalDays)); return { ...t, deadline: fmtDate(d) }; }); }

        /* ═══════════════════════════════════════════════════════════════════════════════
           STYLE CONSTANTS
           ═══════════════════════════════════════════════════════════════════════════════ */
        const TYPE_STYLES = {
            "Learning New Concept": { c: "#F0A500", bg: "rgba(240,165,0,0.1)", b: "rgba(240,165,0,0.25)" },
            "Problem Solving": { c: "#F87171", bg: "rgba(248,113,113,0.1)", b: "rgba(248,113,113,0.25)" },
            "Writing / Drafting": { c: "#A78BFA", bg: "rgba(167,139,250,0.1)", b: "rgba(167,139,250,0.25)" },
            "Revision": { c: "#2DD4BF", bg: "rgba(45,212,191,0.1)", b: "rgba(45,212,191,0.25)" },
            "Reading": { c: "#60A5FA", bg: "rgba(96,165,250,0.1)", b: "rgba(96,165,250,0.25)" },
        };
        const PRI_STYLES = { High: { c: "#F87171", bg: "rgba(248,113,113,0.1)" }, Medium: { c: "#F0A500", bg: "rgba(240,165,0,0.1)" }, Low: { c: "#8B949E", bg: "rgba(139,148,158,0.1)" } };
        const PIPELINE_STEPS = [
            { id: "chunk", label: "1 · Text chunking — paragraph-based segmentation" },
            { id: "embed", label: "2 · Embed chunks → vectors (Xenova/all-MiniLM-L6-v2)" },
            { id: "query", label: "3 · Embed topic query → query vector" },
            { id: "retrieve", label: "4 · Cosine similarity → top-K relevant chunks retrieved" },
            { id: "rules", label: "5 · Rules engine — topic extraction + type classification" },
            { id: "output", label: "6 · CL formula + deadline distribution + priority assignment" },
        ];
        const ACCEPTED_EXT = new Set(['.txt', '.md', '.csv', '.pdf', '.png', '.jpg', '.jpeg', '.webp', '.gif', '.bmp', '.json', '.rtf']);
        const MAX_FILE_SIZE = 50 * 1024 * 1024; // 50 MB

        /* ═══════════════════════════════════════════════════════════════════════════════
           UTILITY HELPERS
           ═══════════════════════════════════════════════════════════════════════════════ */
        function fmtSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }
        function getFileExt(name) {
            const dot = name.lastIndexOf('.');
            return dot >= 0 ? name.slice(dot).toLowerCase() : '';
        }
        function getFileCategory(file) {
            if (file.type.startsWith('image/')) return 'image';
            if (file.type === 'application/pdf' || getFileExt(file.name) === '.pdf') return 'pdf';
            return 'text';
        }
        function uid() { return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7); }

        /* ═══════════════════════════════════════════════════════════════════════════════
           LAZY LIBRARY LOADERS
           ═══════════════════════════════════════════════════════════════════════════════ */
        let _pdfLoading = null;
        async function ensurePDFJS() {
            if (window.pdfjsLib) return;
            if (_pdfLoading) return _pdfLoading;
            _pdfLoading = new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js';
                s.onload = () => { window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js'; resolve(); };
                s.onerror = reject;
                document.head.appendChild(s);
            });
            return _pdfLoading;
        }

        let _tessLoading = null;
        async function ensureTesseract(onProgress) {
            if (window.Tesseract) return window.Tesseract;
            if (_tessLoading) return _tessLoading;
            _tessLoading = new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
                s.onload = () => resolve(window.Tesseract);
                s.onerror = reject;
                document.head.appendChild(s);
            });
            return _tessLoading;
        }

        /* ═══════════════════════════════════════════════════════════════════════════════
           FILE PROCESSING
           ═══════════════════════════════════════════════════════════════════════════════ */
        async function processTextFile(file) {
            return await file.text();
        }

        async function processPDF(file, onProgress) {
            await ensurePDFJS();
            onProgress('Loading PDF…');
            const buf = await file.arrayBuffer();
            const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
            let text = '';
            for (let i = 1; i <= pdf.numPages; i++) {
                onProgress(`Extracting page ${i}/${pdf.numPages}`);
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const pageText = content.items.map(it => it.str).join(' ').replace(/\s+/g, ' ');
                if (pageText.trim()) text += `[Page ${i}] ${pageText.trim()}\n\n`;
            }
            return text.trim() || '(No extractable text found in this PDF)';
        }

        async function processImage(file, onProgress) {
            await ensureTesseract();
            onProgress('Initialising OCR engine…');
            const T = window.Tesseract;
            const worker = await T.createWorker('eng', 1, {
                logger: m => {
                    if (m.status === 'recognizing text') onProgress(`OCR: ${Math.round(m.progress * 100)}%`);
                    else if (m.status === 'loading language traineddata') onProgress('Loading OCR language data…');
                    else if (m.status === 'initializing api') onProgress('Initialising OCR API…');
                }
            });
            try {
                const { data: { text } } = await worker.recognize(file);
                return text.trim() || '(No text detected in this image)';
            } finally {
                await worker.terminate();
            }
        }

        /* ═══════════════════════════════════════════════════════════════════════════════
           SVG ICON COMPONENTS
           ═══════════════════════════════════════════════════════════════════════════════ */
        const UploadIcon = ({ size = 28, color = "#484F58" }) => (
            <svg width={size} height={size} fill="none" viewBox="0 0 24 24" stroke={color} strokeWidth="1.5">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1 18 19.5H6.75Z" />
            </svg>

        const ImageIcon = ({ size = 16, color = "#60A5FA" }) => (
            <svg width={size} height={size} fill="none" viewBox="0 0 24 24" stroke={color} strokeWidth="1.5">
                <path strokeLinecap="round" strokeLinejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0 0 22.5 18.75V5.25A2.25 2.25 0 0 0 20.25 3H3.75A2.25 2.25 0 0 0 1.5 5.25v13.5A2.25 2.25 0 0 0 3.75 21Z" />
            </svg>
        );
        const PDFIcon = ({ size = 16, color = "#F87171" }) => (
            <svg width={size} height={size} fill="none" viewBox="0 0 24 24" stroke={color} strokeWidth="1.5">
                <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
            </svg>
        );
        const FileIcon = ({ size = 16, color = "#8B949E" }) => (
            <svg width={size} height={size} fill="none" viewBox="0 0 24 24" stroke={color} strokeWidth="1.5">
                <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
            </svg>
        );
        const XIcon = ({ size = 12, color = "#8B949E" }) => (
            <svg width={size} height={size} fill="none" viewBox="0 0 24 24" stroke={color} strokeWidth="2">
                <path strokeLinecap="round" strokeLinejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
        );
        const CheckIcon = ({ size = 14, color = "#3FB950" }) => (
            <svg width={size} height={size} fill="none" viewBox="0 0 24 24" stroke={color} strokeWidth="2">
                <path strokeLinecap="round" strokeLinejoin="round" d="m4.5 12.75 6 6 9-13.5" />
            </svg>
        );
        const EyeIcon = ({ size = 14, color = "#8B949E" }) => (
            <svg width={size} height={size} fill="none" viewBox="0 0 24 24" stroke={color} strokeWidth="1.5">
                <path strokeLinecap="round" strokeLinejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
        );
        const ClipboardIcon = ({ size = 14, color = "#8B949E" }) => (
            <svg width={size} height={size} fill="none" viewBox="0 0 24 24" stroke={color} strokeWidth="1.5">
                <path strokeLinecap="round" strokeLinejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9.75a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184" />
            </svg>
        );

        /* ═══════════════════════════════════════════════════════════════════════════════
           TOAST SYSTEM
           ═══════════════════════════════════════════════════════════════════════════════ */
        let _toastId = 0;
        function ToastContainer({ toasts }) {
            return (
                <div style={{ position: 'fixed', top: 16, right: 16, zIndex: 9999, display: 'flex', flexDirection: 'column', gap: 8, pointerEvents: 'none' }}>
                    {toasts.map(t => (
                        <div key={t.id} style={{
                            background: t.type === 'error' ? 'rgba(248,113,113,0.15)' : 'rgba(22,27,34,0.95)',
                            border: `1px solid ${t.type === 'error' ? 'rgba(248,113,113,0.3)' : '#21262D'}`,
                            borderRadius: 8, padding: '10px 14px', fontFamily: "'DM Mono',monospace", fontSize: 11,
                            color: t.type === 'error' ? '#F87171' : '#E6EDF3', backdropFilter: 'blur(12px)',
                            animation: t.leaving ? 'toastOut 0.25s ease forwards' : 'toastIn 0.3s ease both',
                            boxShadow: '0 8px 24px rgba(0,0,0,0.4)', pointerEvents: 'auto', maxWidth: 320,
                        }}>
                            {t.type === 'error' ? '⚠ ' : ''}{t.message}
                        </div>
                    ))}
                </div>
            );
        }

        /* ═══════════════════════════════════════════════════════════════════════════════
           MAIN COMPONENT
           ═══════════════════════════════════════════════════════════════════════════════ */
        export default function TaskGenerator() {
            // ── Form State ──
            const [topic, setTopic] = React.useState("");
            const [deadline, setDeadline] = React.useState("");
            const [subject, setSubject] = React.useState("");
            const [syllabus, setSyllabus] = React.useState("");
            const [textbook, setTextbook] = React.useState("");

            // ── Pipeline State ──
            const [tasks, setTasks] = React.useState([]);
            const [phase, setPhase] = React.useState("idle");
            const [progress, setProgress] = React.useState("");
            const [activeStep, setActiveStep] = React.useState(null);
            const [error, setError] = React.useState("");
            const [tab, setTab] = React.useState("input");
            const [copied, setCopied] = React.useState(false);
            const [pipe, setPipe] = React.useState(null);
            const [modelReady, setModelReady] = React.useState(false);

            // ── File Upload State ──
            const [files, setFiles] = React.useState([]); // {id,name,category,size,thumb,status,text,error,processingMsg}
            const [isDragOver, setIsDragOver] = React.useState(false);
            const [toasts, setToasts] = React.useState([]);
            const [previewFile, setPreviewFile] = React.useState(null); // id of file whose text we're previewing
            const [showExtracted, setShowExtracted] = React.useState(false);
            const fileInputRef = React.useRef(null);

            // ── Toast helper ──
            const addToast = React.useCallback((message, type = 'info', duration = 3000) => {
                const id = ++_toastId;
                setToasts(prev => [...prev, { id, message, type, leaving: false }]);
                setTimeout(() => { setToasts(prev => prev.map(t => t.id === id ? { ...t, leaving: true } : t)); }, duration - 250);
                setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, duration);
            }, []);

            // ── Load embedding model ──
            React.useEffect(() => { loadModel(); }, []);

            async function loadModel() {
                setPhase("model"); setProgress("Initialising embedding model…");
                try {
                    const { pipeline, env } = await import("https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1/dist/transformers.min.js");
                    env.allowLocalModels = false;
                    const p = await pipeline("feature-extraction", "Xenova/all-MiniLM-L6-v2',{
        progress_callback: ({ status, file, loaded, total }) => {
                        if (status === "downloading") setProgress(`Downloading ${file} — ${Math.round((loaded / total) * 100)}%`);
                    },
      });
                setPipe(() => p); setModelReady(true); setPhase("idle"); setProgress("");
            } catch (e) {
                setError("Model load failed: " + e.message); setPhase("error");
            }
        }

        // ── Global paste listener for images & files ──
        React.useEffect(() => {
            const handler = async (e) => {
                const items = Array.from(e.clipboardData?.items || []);
                const fileItems = items.filter(it => it.kind === 'file');
                if (!fileItems.length) return; // Let normal text paste through

                // Don't intercept if user is typing in an input and pasting text alongside
                // But DO intercept images pasted anywhere
                const hasImage = fileItems.some(it => it.type.startsWith('image/'));
                const hasNonImage = fileItems.some(it => !it.type.startsWith('image/'));
                const active = document.activeElement;
                const isTypingField = active && (active.tagName === 'INPUT' && active.type === 'text' || active.tagName === 'TEXTAREA');

                // Only intercept if there's an image, or if we're not in a text field
                if (!hasImage && isTypingField) return;
                if (hasNonImage && !hasImage && isTypingField) return;

                e.preventDefault();
                e.stopPropagation();

                for (const item of fileItems) {
                    const file = item.getAsFile();
                    if (file) handleFile(file);
                }
                addToast(hasImage ? 'Image pasted from clipboard' : 'File pasted from clipboard');
            };
            document.addEventListener('paste', handler, true);
            return () => document.removeEventListener('paste', handler, true);
        }, []);

        // ── File validation & enqueue ──
        function handleFile(file) {
            const ext = getFileExt(file.name);
            if (!ACCEPTED_EXT.has(ext) && !file.type.startsWith('image/') && file.type !== 'application/pdf') {
                addToast(`Unsupported file type: ${ext || file.type}`, 'error');
                return;
            }
            if (file.size > MAX_FILE_SIZE) {
                addToast(`File too large: ${fmtSize(file.size)} (max 50 MB)`, 'error');
                return;
            }
            const category = getFileCategory(file);
            const entry = {
                id: uid(),
                name: file.name,
                category,
                size: file.size,
                thumb: category === 'image' ? URL.createObjectURL(file) : null,
                status: 'pending', // pending | processing | done | error
                text: '',
                error: '',
                processingMsg: '',
                _file: file, // keep raw file for processing
            };
            setFiles(prev => [...prev, entry]);
            processFileEntry(entry);
        }

        async function processFileEntry(entry) {
            setFiles(prev => prev.map(f => f.id === entry.id ? { ...f, status: 'processing', processingMsg: 'Queued…' } : f));

            try {
                let text = '';
                const onMsg = (msg) => setFiles(prev => prev.map(f => f.id === entry.id ? { ...f, processingMsg: msg } : f));

                if (entry.category === 'text') {
                    onMsg('Reading text file…');
                    text = await processTextFile(entry._file);
                } else if (entry.category === 'pdf') {
                    text = await processPDF(entry._file, onMsg);
                } else if (entry.category === 'image') {
                    text = await processImage(entry._file, onMsg);
                }

                setFiles(prev => prev.map(f => f.id === entry.id ? { ...f, status: 'done', text, processingMsg: '' } : f));
                const lines = text.split('\n').filter(l => l.trim()).length;
                addToast(`${entry.name}: ${lines} lines extracted`);
            } catch (err) {
                setFiles(prev => prev.map(f => f.id === entry.id ? { ...f, status: 'error', error: err.message, processingMsg: '' } : f));
                addToast(`${entry.name}: ${err.message}`, 'error');
            }
        }

        function removeFile(id) {
            setFiles(prev => {
                const f = prev.find(x => x.id === id);
                if (f?.thumb) URL.revokeObjectURL(f.thumb);
                return prev.filter(x => x.id !== id);
            });
            if (previewFile === id) setPreviewFile(null);
        }

        function clearAllFiles() {
            files.forEach(f => { if (f.thumb) URL.revokeObjectURL(f.thumb); });
            setFiles([]);
            setPreviewFile(null);
        }

        // ── Drag & drop handlers ──
        const onDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setIsDragOver(true); };
        const onDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); setIsDragOver(false); };
        const onDrop = (e) => {
            e.preventDefault(); e.stopPropagation(); setIsDragOver(false);
            const dropped = Array.from(e.dataTransfer.files);
            if (!dropped.length) return;
            dropped.forEach(f => handleFile(f));
            if (dropped.length === 1) addToast(`${dropped[0].name} added`);
            else addToast(`${dropped.length} files added`);
        };

        // ── Compute extracted text from all done files ──
        const extractedText = React.useMemo(() => {
            return files.filter(f => f.status === 'done' && f.text).map(f => `── ${f.name} ──\n${f.text}`).join('\n\n');
        }, [files]);

        // ── Generate tasks ──
        async function generate() {
            if (!topic.trim()) return setError("Topic is required.");
            if (!deadline.trim()) return setError("Deadline is required.");
            if (!syllabus.trim() && !textbook.trim() && !extractedText.trim()) return setError("Provide syllabus, textbook content, or upload files.");
            if (!modelReady) return setError("Embedding model not ready yet.");
            setError(""); setTasks([]); setTab("output");

            try {
                const content = [syllabus, extractedText, textbook].filter(Boolean).join("\n\n");

                setPhase("chunk"); setActiveStep("chunk"); setProgress("Chunking text…");
                const chunks = chunkText(content);
                if (!chunks.length) throw new Error("No extractable content found. Upload files or paste more text.");

                setPhase("embed"); setActiveStep("embed");
                const cEmbs = [];
                for (let i = 0; i < chunks.length; i++) {
                    setProgress(`Embedding chunk ${i + 1} / ${chunks.length}`);
                    const out = await pipe([chunks[i]], { pooling: "mean", normalize: true });
                    cEmbs.push(out.data ? Array.from(out.data) : out.tolist()[0]);
                }

                setActiveStep("query"); setProgress("Embedding topic query…");
                const qOut = await pipe([`Learning topics for ${topic}`], { pooling: "mean", normalize: true });
                const qEmb = qOut.data ? Array.from(qOut.data) : qOut.tolist()[0];

                setActiveStep("retrieve"); setProgress("Retrieving relevant chunks…");
                const retrieved = topK(qEmb, cEmbs, chunks, Math.min(12, chunks.length));

                setActiveStep("rules"); setProgress("Running rules engine…");
                await new Promise(r => setTimeout(r, 60));
                const generated = buildTasks(retrieved, topic, deadline, subject);

                setActiveStep("output"); setProgress("Done.");
                await new Promise(r => setTimeout(r, 200));
                setTasks(generated); setPhase("done"); setActiveStep(null); setProgress("");
            } catch (e) {
                setError(e.message); setPhase("error"); setTab("input"); setActiveStep(null);
            }
        }

        function exportJSON() {
            const a = document.createElement("a");
            a.href = URL.createObjectURL(new Blob([JSON.stringify(tasks, null, 2)], { type: "application/json" }));
            a.download = `tasks-${topic.slice(0, 20).replace(/\s+/g, "-")}.json`; a.click();
        }
        function copyJSON() {
            navigator.clipboard.writeText(JSON.stringify(tasks, null, 2));
            setCopied(true); setTimeout(() => setCopied(false), 2000);
        }
        function copyExtracted() {
            navigator.clipboard.writeText(extractedText);
            addToast('Extracted text copied to clipboard');
        }

        const busy = ["model", "chunk", "embed", "query", "retrieve", "rules", "output"].includes(phase) && phase !== "done";
        const totalH = (tasks.reduce((s, t) => s + t.duration, 0) / 60).toFixed(1);
        const byType = tasks.reduce((o, t) => { o[t.type] = (o[t.type] || 0) + 1; return o; }, {});
        const done = tasks.length > 0 && !busy;
        const processingFiles = files.filter(f => f.status === 'processing').length;
        const doneFiles = files.filter(f => f.status === 'done').length;

        // ── Inline style helpers ──
        const inpStyle = (extra = {}) => ({
            width: '100%', background: '#161B22', border: '1px solid #21262D', borderRadius: 6,
            color: '#E6EDF3', fontFamily: "'DM Sans',sans-serif", fontSize: 13, padding: '8px 11px',
            outline: 'none', boxSizing: 'border-box', transition: 'border-color 0.15s',
            onFocus: e => { e.target.style.borderColor = '#F0A500'; },
            onBlur: e => { e.target.style.borderColor = '#21262D'; },
            ...extra
        });
        const taStyle = (extra = {}) => ({
            width: '100%', background: '#0D1117', border: '1px solid #21262D', borderRadius: 6,
            color: '#E6EDF3', fontFamily: "'DM Mono',monospace", fontSize: 11, padding: '10px 12px',
            outline: 'none', resize: 'vertical', minHeight: 108, boxSizing: 'border-box', lineHeight: 1.6,
            transition: 'border-color 0.15s',
            onFocus: e => { e.target.style.borderColor = '#F0A500'; },
            onBlur: e => { e.target.style.borderColor = '#21262D'; },
            ...extra
        });
        const badge = (c, bg, b) => ({ fontFamily: "'DM Mono',monospace", fontSize: 10, padding: '2px 6px', borderRadius: 3, whiteSpace: 'nowrap', color: c, background: bg, border: `1px solid ${b || 'transparent'}` });

        return (
            <div style={{ background: '#0D1117', minHeight: '100vh', fontFamily: "'DM Sans',sans-serif", color: '#E6EDF3' }}>
                <ToastContainer toasts={toasts} />

                {/* ── HEADER ── */}
                <div style={{ background: '#161B22', borderBottom: '1px solid #21262D', padding: '13px 22px', display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
                    <div style={{ background: 'linear-gradient(135deg,#F0A500,#E08900)', borderRadius: 6, width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: "'DM Mono',monospace", fontSize: 11, fontWeight: 700, color: '#000', flexShrink: 0 }}>TG</div>
                    <span style={{ fontFamily: "'DM Mono',monospace", fontSize: 14, fontWeight: 500 }}>Deterministic Task Generator</span>
                    <span style={{ marginLeft: 4, fontFamily: "'DM Mono',monospace", fontSize: 9, color: '#484F58', background: '#21262D', padding: '2px 6px', borderRadius: 3 }}>
                        RAG + Rules Engine · No LLM at Runtime
                    </span>
                    <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 6 }}>
                        <div style={{ width: 6, height: 6, borderRadius: '50%', background: modelReady ? '#3FB950' : '#F0A500', boxShadow: modelReady ? '0 0 6px rgba(63,185,80,.5)' : '0 0 6px rgba(240,165,0,.5)' }} />
                        <span style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: modelReady ? '#3FB950' : '#F0A500' }}>
                            {modelReady ? 'all-MiniLM-L6-v2 ready' : 'Loading model…'}
                        </span>
                    </div>
                </div>

                <div style={{ padding: '18px 22px', maxWidth: 880, margin: '0 auto' }}>

                    {/* ── PIPELINE DIAGRAM ── */}
                    <div style={{ background: '#0D1117', border: '1px solid #21262D', borderRadius: 6, padding: '11px 14px', marginBottom: 18, lineHeight: 1.9 }}>
                        {PIPELINE_STEPS.map(st => {
                            const isActive = activeStep === st.id;
                            const isDone = done || (activeStep && PIPELINE_STEPS.findIndex(s => s.id === activeStep) > PIPELINE_STEPS.findIndex(s => s.id === st.id));
                            return (
                                <div key={st.id} style={{
                                    fontFamily: "'DM Mono',monospace", fontSize: 11, padding: '2px 0',
                                    color: isActive ? '#F0A500' : isDone ? '#3FB950' : '#484F58', fontWeight: isActive ? 500 : 400
                                }}>
                                    {isActive ? '▶ ' : isDone ? '✓ ' : '○ '}{st.label}
                                </div>
                            );
                        })}
                    </div>

                    {/* ── TABS ── */}
                    <div style={{ display: 'flex', gap: 2, marginBottom: 16, background: '#161B22', borderRadius: 8, padding: 3, border: '1px solid #21262D', width: 'fit-content' }}>
                        {["input", "output"].map(t => (
                            <button key={t} style={{
                                padding: '5px 14px', borderRadius: 5, fontFamily: "'DM Mono',monospace", fontSize: 11, cursor: 'pointer', border: 'none', transition: 'all .15s',
                                background: tab === t ? '#F0A500' : 'transparent', color: tab === t ? '#000' : '#8B949E', fontWeight: tab === t ? 600 : 400,
                            }} onClick={() => setTab(t)}>
                                {t === "output" && tasks.length > 0 ? `Tasks (${tasks.length})` : t.charAt(0).toUpperCase() + t.slice(1)}
                            </button>
                        ))}
                    </div>

                    {error && <div style={{ background: 'rgba(248,113,113,.08)', border: '1px solid rgba(248,113,113,.2)', borderRadius: 6, padding: '9px 13px', marginBottom: 14, fontFamily: "'DM Mono',monospace", fontSize: 12, color: '#F87171' }}>⚠ {error}</div>}

                    {/* ── PROGRESS BAR ── */}
                    {busy && (
                        <div style={{ background: '#161B22', border: '1px solid #21262D', borderRadius: 6, padding: '14px 16px', marginBottom: 16 }}>
                            <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: '#484F58', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 6 }}>Pipeline running</div>
                            <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 12, color: '#F0A500', marginBottom: 8 }}>{progress}</div>
                            <div style={{ background: '#21262D', borderRadius: 2, height: 3, overflow: 'hidden' }}>
                                <div style={{ height: 3, background: '#F0A500', borderRadius: 2, animation: 'pgbar 1.4s ease-in-out infinite', width: '60%' }} />
                            </div>
                        </div>
                    )}

                    {/* ═══════════════════════════════════════════════════════════════════════
            INPUT TAB
            ═══════════════════════════════════════════════════════════════════════ */}
                    {tab === "input" && (
                        <div>
                            {/* Topic + Deadline grid */}
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 }}>
                                <div>
                                    <label style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: '#484F58', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 6, display: 'block' }}>Topic / Learning Goal *</label>
                                    <input style={inpStyle()} value={topic} onChange={e => setTopic(e.target.value)} placeholder="e.g. Graph Algorithms in DSA" />
                                </div>
                                <div>
                                    <label style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: '#484F58', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 6, display: 'block' }}>Final Deadline *</label>
                                    <input style={inpStyle()} value={deadline} onChange={e => setDeadline(e.target.value)} placeholder="e.g. in 3 weeks · 15 May 2026" />
                                </div>
                            </div>

                            {/* Subject */}
                            <div style={{ marginBottom: 14 }}>
                                <label style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: '#484F58', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 6, display: 'block' }}>Subject (optional)</label>
                                <input style={inpStyle({ width: '100%' })} value={subject} onChange={e => setSubject(e.target.value)} placeholder="e.g. Data Structures and Algorithms" />
                            </div>

                            {/* ── FILE UPLOAD DROP ZONE ── */}
                            <div style={{ marginBottom: 14 }}>
                                <label style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: '#484F58', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 6, display: 'block' }}>
                                    Upload Files — Images, PDFs, Text
                                </label>
                                <div
                                    tabIndex={0}
                                    role="button"
                                    aria-label="Drop files here or click to browse"
                                    onDragOver={onDragOver}
                                    onDragLeave={onDragLeave}
                                    onDrop={onDrop}
                                    onClick={() => fileInputRef.current?.click()}
                                    onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInputRef.current?.click(); } }}
                                    style={{
                                        border: isDragOver ? '2px solid #F0A500' : '2px dashed #30363D',
                                        borderRadius: 10,
                                        padding: '28px 20px',
                                        textAlign: 'center',
                                        cursor: 'pointer',
                                        transition: 'all 0.2s ease',
                                        background: isDragOver
                                            ? 'linear-gradient(135deg, rgba(240,165,0,0.08), rgba(240,165,0,0.03))'
                                            : 'linear-gradient(135deg, rgba(22,27,34,0.8), rgba(13,17,23,0.6))',
                                        boxShadow: isDragOver ? '0 0 30px rgba(240,165,0,0.1), inset 0 0 30px rgba(240,165,0,0.03)' : 'none',
                                        outline: 'none',
                                    }}
                                >
                                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10 }}>
                                        <div style={{
                                            width: 48, height: 48, borderRadius: 12, display: 'flex', alignItems: 'center', justifyContent: 'center',
                                            background: isDragOver ? 'rgba(240,165,0,0.15)' : 'rgba(48,54,61,0.4)',
                                            transition: 'background 0.2s',
                                        }}>
                                            <UploadIcon size={24} color={isDragOver ? '#F0A500' : '#484F58'} />
                                        </div>
                                        <div>
                                            <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 13, fontWeight: 500, color: isDragOver ? '#F0A500' : '#E6EDF3', marginBottom: 4 }}>
                                                {isDragOver ? 'Drop files here' : 'Drop files here or click to browse'}
                                            </div>
                                            <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: '#484F58', display: 'flex', alignItems: 'center', gap: 6, justifyContent: 'center', flexWrap: 'wrap' }}>
                                                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3 }}><ImageIcon size={12} /> Images</span>
                                                <span style={{ color: '#21262D' }}>·</span>
                                                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3 }}><PDFIcon size={12} /> PDFs</span>
                                                <span style={{ color: '#21262D' }}>·</span>
                                                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3 }}><FileIcon size={12} /> Text</span>
                                                <span style={{ color: '#21262D' }}>·</span>
                                                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3 }}><ClipboardIcon size={12} /> Paste (Ctrl+V)</span>
                                            </div>
                                        </div>
                                        <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 9, color: '#30363D' }}>
                                            PNG · JPG · WEBP · GIF · PDF · TXT · MD · CSV · JSON — max 50 MB each
                                        </div>
                                    </div>
                                    <input
                                        ref={fileInputRef}
                                        type="file"
                                        multiple
                                        accept=".txt,.md,.csv,.pdf,.png,.jpg,.jpeg,.webp,.gif,.bmp,.json"
                                        style={{ display: 'none' }}
                                        onChange={e => {
                                            Array.from(e.target.files).forEach(f => handleFile(f));
                                            e.target.value = ''; // reset so same file can be re-uploaded
                                        }}
                                    />
                                </div>
                            </div>

                            {/* ── FILE LIST ── */}
                            {files.length > 0 && (
                                <div className="fade-up" style={{ marginBottom: 14 }}>
                                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                                        <span style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: '#484F58', letterSpacing: '0.08em', textTransform: 'uppercase' }}>
                                            Uploaded Files ({files.length})
                                            {doneFiles > 0 && <span style={{ color: '#3FB950', marginLeft: 6 }}>✓ {doneFiles} processed</span>}
                                            {processingFiles > 0 && <span style={{ color: '#F0A500', marginLeft: 6 }}>⟳ {processingFiles} processing</span>}
                                        </span>
                                        <button
                                            onClick={clearAllFiles}
                                            style={{ background: 'none', border: '1px solid #21262D', borderRadius: 4, padding: '2px 8px', fontFamily: "'DM Mono',monospace", fontSize: 10, color: '#484F58', cursor: 'pointer', transition: 'all .15s' }}
                                            onMouseEnter={e => { e.target.style.borderColor = '#F87171'; e.target.style.color = '#F87171'; }}
                                            onMouseLeave={e => { e.target.style.borderColor = '#21262D'; e.target.style.color = '#484F58'; }}
                                        >Clear all</button>
                                    </div>

                                    <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                                        {files.map((f, idx) => (
                                            <div key={f.id} className="fade-up" style={{
                                                background: '#161B22', border: `1px solid ${f.status === 'error' ? 'rgba(248,113,113,0.3)' : f.status === 'processing' ? 'rgba(240,165,0,0.25)' : '#21262D'}`,
                                                borderRadius: 8, padding: 8, width: 160, position: 'relative',
                                                animationDelay: `${idx * 50}ms`,
                                            }}>
                                                {/* Remove button */}
                                                <button
                                                    onClick={e => { e.stopPropagation(); removeFile(f.id); }}
                                                    style={{ position: 'absolute', top: 4, right: 4, background: 'rgba(13,17,23,0.8)', border: 'none', borderRadius: 4, padding: 2, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', lineHeight: 0 }}
                                                    aria-label={`Remove ${f.name}`}
                                                >
                                                    <XIcon size={10} color="#8B949E" />
                                                </button>

                                                {/* Thumbnail / Icon */}
                                                <div style={{ width: '100%', height: 72, borderRadius: 4, overflow: 'hidden', marginBottom: 6, display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#0D1117' }}>
                                                    {f.category === 'image' && f.thumb ? (
                                                        <img src={f.thumb} alt={f.name} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                                                    ) : f.category === 'pdf' ? (
                                                        <PDFIcon size={28} color="#F87171" />
                                                    ) : (
                                                        <FileIcon size={28} color="#8B949E" />
                                                    )}
                                                </div>

                                                {/* Filename */}
                                                <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 11, fontWeight: 500, color: '#E6EDF3', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', marginBottom: 2, paddingRight: 16 }} title={f.name}>
                                                    {f.name}
                                                </div>

                                                {/* Size + Status */}
                                                <div style={{ display: 'flex', alignItems: 'center', gap: 4, fontFamily: "'DM Mono',monospace", fontSize: 9 }}>
                                                    <span style={{ color: '#484F58' }}>{fmtSize(f.size)}</span>
                                                    {f.status === 'done' && (
                                                        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 2, color: '#3FB950' }}><CheckIcon size={11} /> Done</span>
                                                    )}
                                                    {f.status === 'processing' && (
                                                        <span style={{ color: '#F0A500', display: 'inline-flex', alignItems: 'center', gap: 2 }}>
                                                            <span style={{ display: 'inline-block', width: 8, height: 8, border: '1.5px solid #F0A500', borderTopColor: 'transparent', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }} />
                                                            {f.processingMsg || '…'}
                                                        </span>
                                                    )}
                                                    {f.status === 'error' && (
                                                        <span style={{ color: '#F87171' }} title={f.error}>Failed</span>
                                                    )}
                                                    {f.status === 'pending' && (
                                                        <span style={{ color: '#484F58' }}>Queued</span>
                                                    )}
                                                </div>

                                                {/* Preview button for done files */}
                                                {f.status === 'done' && f.text && (
                                                    <button
                                                        onClick={e => { e.stopPropagation(); setPreviewFile(previewFile === f.id ? null : f.id); }}
                                                        style={{
                                                            position: 'absolute', bottom: 4, right: 4, background: 'rgba(13,17,23,0.8)', border: 'none', borderRadius: 4, padding: 2, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', lineHeight: 0,
                                                            border: previewFile === f.id ? '1px solid #F0A500' : '1px solid transparent',
                                                        }}
                                                        aria-label={`Preview extracted text from ${f.name}`}
                                                        title="Preview extracted text"
                                                    >
                                                        <EyeIcon size={11} color={previewFile === f.id ? '#F0A500' : '#8B949E'} />
                                                    </button>
                                                )}
                                            </div>
                                        ))}
                                    </div>

                                    {/* ── Text preview for a single file ── */}
                                    {previewFile && (() => {
                                        const pf = files.find(f => f.id === previewFile);
                                        if (!pf) return null;
                                        return (
                                            <div className="fade-up" style={{ marginTop: 10, background: '#0D1117', border: '1px solid #21262D', borderRadius: 6, overflow: 'hidden' }}>
                                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 12px', background: '#161B22', borderBottom: '1px solid #21262D' }}>
                                                    <span style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: '#F0A500' }}>Extracted: {pf.name}</span>
                                                    <div style={{ display: 'flex', gap: 6 }}>
                                                        <button onClick={() => { navigator.clipboard.writeText(pf.text); addToast('Copied'); }} style={{ background: 'none', border: '1px solid #21262D', borderRadius: 3, padding: '1px 6px', fontFamily: "'DM Mono',monospace", fontSize: 9, color: '#8B949E', cursor: 'pointer' }}>Copy</button>
                                                        <button onClick={() => setPreviewFile(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', lineHeight: 0 }}><XIcon size={10} /></button>
                                                    </div>
                                                </div>
                                                <pre style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: '#8B949E', padding: '10px 12px', maxHeight: 160, overflow: 'auto', margin: 0, whiteSpace: 'pre-wrap', wordBreak: 'break-word', lineHeight: 1.6 }}>
                                                    {pf.text.slice(0, 3000)}{pf.text.length > 3000 ? '\n\n… (truncated, full text will be used in generation)' : ''}
                                                </pre>
                                            </div>
                                        );
                                    })()}

                                    {/* ── Collapsible: all extracted text ── */}
                                    {doneFiles > 1 && (
                                        <div style={{ marginTop: 10 }}>
                                            <button
                                                onClick={() => setShowExtracted(!showExtracted)}
                                                style={{ background: 'none', border: '1px solid #21262D', borderRadius: 5, padding: '5px 10px', fontFamily: "'DM Mono',monospace", fontSize: 10, color: '#8B949E', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, transition: 'all .15s' }}
                                            >
                                                <span style={{ transform: showExtracted ? 'rotate(90deg)' : 'rotate(0deg)', transition: 'transform .15s', display: 'inline-block' }}>▶</span>
                                                All extracted text ({extractedText.split('\n').filter(l => l.trim()).length} lines)
                                            </button>
                                            {showExtracted && (
                                                <div className="fade-up" style={{ marginTop: 8, background: '#0D1117', border: '1px solid #21262D', borderRadius: 6, overflow: 'hidden' }}>
                                                    <div style={{ display: 'flex', justifyContent: 'flex-end', padding: '6px 10px', background: '#161B22', borderBottom: '1px solid #21262D' }}>
                                                        <button onClick={copyExtracted} style={{ background: 'none', border: '1px solid #21262D', borderRadius: 3, padding: '2px 8px', fontFamily: "'DM Mono',monospace", fontSize: 9, color: '#8B949E', cursor: 'pointer' }}>Copy all</button>
                                                    </div>
                                                    <pre style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: '#8B949E', padding: '10px 12px', maxHeight: 200, overflow: 'auto', margin: 0, whiteSpace: 'pre-wrap', wordBreak: 'break-word', lineHeight: 1.6 }}>
                                                        {extractedText.slice(0, 5000)}{extractedText.length > 5000 ? '\n\n… (truncated)' : ''}
                                                    </pre>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Syllabus */}
                            <div style={{ marginBottom: 14 }}>
                                <label style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: '#484F58', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 6, display: 'block' }}>
                                    Syllabus / Topic List {(!syllabus.trim() && !extractedText.trim()) ? '*' : ''}
                                </label>
                                <textarea style={taStyle()} value={syllabus} onChange={e => setSyllabus(e.target.value)}
                                    placeholder={"Paste your syllabus here, e.g.:\n1. Introduction to Graphs\n2. BFS and DFS Traversal\n3. Dijkstra's Shortest Path\n4. Minimum Spanning Trees\n5. Dynamic Programming on Graphs"} />
                            </div>

                            {/* Textbook */}
                            <div style={{ marginBottom: 14 }}>
                                <label style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: '#484F58', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 6, display: 'block' }}>
                                    Textbook / Notes Excerpt (optional)
                                    {extractedText.trim() && (
                                        <span style={{ color: '#2DD4BF', marginLeft: 8, fontWeight: 400, fontSize: 9 }}>+ {doneFiles} file{doneFiles > 1 ? 's' : ''} appended automatically</span>
                                    )}
                                </label>
                                <textarea style={taStyle({ minHeight: 110 })} value={textbook} onChange={e => setTextbook(e.target.value)}
                                    placeholder="Paste chapter text, lecture notes, or any content to retrieve relevant sections from…" />
                            </div>

                            {/* Generate button */}
                            <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
                                <button
                                    style={{ background: '#F0A500', color: '#000', border: 'none', borderRadius: 6, padding: '9px 18px', fontFamily: "'DM Mono',monospace", fontSize: 12, fontWeight: 600, cursor: busy || !modelReady ? 'not-allowed' : 'pointer', letterSpacing: '0.04em', opacity: busy || !modelReady ? 0.5 : 1, transition: 'opacity .15s' }}
                                    onClick={generate} disabled={busy || !modelReady}>
                                    {busy ? '↺ Running…' : '→ Generate Tasks'}
                                </button>
                                <span style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: '#484F58' }}>
                                    Embedding retrieval → rules engine → CogFlow-ready JSON
                                </span>
                            </div>
                        </div>
                    )}

                    {/* ═══════════════════════════════════════════════════════════════════════
            OUTPUT TAB
            ═══════════════════════════════════════════════════════════════════════ */}
                    {tab === "output" && done && (
                        <div>
                            {/* Stats */}
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 8, marginBottom: 16 }}>
                                <div style={{ background: '#161B22', border: '1px solid #21262D', borderRadius: 6, padding: '10px 13px' }}>
                                    <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 20, fontWeight: 500, color: '#F0A500' }}>{tasks.length}</div>
                                    <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 9, color: '#484F58', textTransform: 'uppercase', letterSpacing: '0.06em', marginTop: 2 }}>Tasks</div>
                                </div>
                                <div style={{ background: '#161B22', border: '1px solid #21262D', borderRadius: 6, padding: '10px 13px' }}>
                                    <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 20, fontWeight: 500, color: '#F0A500' }}>{totalH}h</div>
                                    <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 9, color: '#484F58', textTransform: 'uppercase', letterSpacing: '0.06em', marginTop: 2 }}>Total time</div>
                                </div>
                                <div style={{ background: '#161B22', border: '1px solid #21262D', borderRadius: 6, padding: '10px 13px' }}>
                                    <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 20, fontWeight: 500, color: '#F0A500' }}>{tasks.filter(t => t.priority === "High").length}</div>
                                    <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 9, color: '#484F58', textTransform: 'uppercase', letterSpacing: '0.06em', marginTop: 2 }}>High priority</div>
                                </div>
                                <div style={{ background: '#161B22', border: '1px solid #21262D', borderRadius: 6, padding: '10px 13px' }}>
                                    {Object.entries(byType).slice(0, 4).map(([k, v]) => (
                                        <div key={k} style={{ display: 'flex', justifyContent: 'space-between', gap: 8, fontFamily: "'DM Mono',monospace", fontSize: 10 }}>
                                            <span style={{ color: '#484F58' }}>{k.split(' ')[0]}</span>
                                            <span style={{ color: '#F0A500' }}>{v}</span>
                                        </div>
                                    ))}
                                    <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 9, color: '#484F58', textTransform: 'uppercase', letterSpacing: '0.06em', marginTop: 2 }}>by type</div>
                                </div>
                            </div>

                            {/* Actions */}
                            <div style={{ display: 'flex', gap: 8, marginBottom: 14, flexWrap: 'wrap' }}>
                                <button style={{ background: '#F0A500', color: '#000', border: 'none', borderRadius: 6, padding: '9px 18px', fontFamily: "'DM Mono',monospace", fontSize: 12, fontWeight: 600, cursor: 'pointer', letterSpacing: '0.04em' }} onClick={exportJSON}>↓ Export JSON</button>
                                <button style={{ background: '#161B22', color: '#8B949E', border: `1px solid ${copied ? '#3FB950' : '#21262D'}`, borderRadius: 6, padding: '7px 13px', fontFamily: "'DM Mono',monospace", fontSize: 11, cursor: 'pointer', color: copied ? '#3FB950' : '#8B949E' }} onClick={copyJSON}>
                                    {copied ? '✓ Copied!' : '⎘ Copy JSON'}
                                </button>
                                <button style={{ background: '#161B22', color: '#8B949E', border: '1px solid #21262D', borderRadius: 6, padding: '7px 13px', fontFamily: "'DM Mono',monospace", fontSize: 11, cursor: 'pointer' }} onClick={() => { setTasks([]); setTab('input'); }}>← Regenerate</button>
                            </div>

                            {/* Task cards */}
                            {tasks.map((task, i) => {
                                const ts = TYPE_STYLES[task.type] || TYPE_STYLES["Reading"];
                                const ps = PRI_STYLES[task.priority] || PRI_STYLES.Low;
                                const dh = task.duration >= 60 ? `${Math.floor(task.duration / 60)}h${task.duration % 60 ? ` ${task.duration % 60}m` : ''}` : `${task.duration}m`;
                                return (
                                    <div key={i} className="fade-up" style={{ background: '#161B22', border: '1px solid #21262D', borderRadius: 7, padding: '12px 14px', marginBottom: 6, display: 'flex', alignItems: 'flex-start', gap: 10, animationDelay: `${i * 30}ms` }}>
                                        <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 11, color: '#484F58', width: 22, flexShrink: 0, paddingTop: 2, textAlign: 'right' }}>{String(i + 1).padStart(2, '0')}</div>
                                        <div style={{ flex: 1 }}>
                                            <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 6, lineHeight: 1.3, color: '#E6EDF3' }}>{task.name}</div>
                                            <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap', alignItems: 'center' }}>
                                                <span style={badge(ts.c, ts.bg, ts.b)}>{task.type}</span>
                                                <span style={badge(ps.c, ps.bg)}>{task.priority}</span>
                                                <span style={badge('#8B949E', 'rgba(139,148,158,.08)', '#21262D')}>{task.subject}</span>
                                                <span style={badge('#8B949E', 'rgba(139,148,158,.08)', '#21262D')}>{dh}</span>
                                                <span style={badge('#8B949E', 'rgba(139,148,158,.08)', '#21262D')}>★ {task.difficulty}/5</span>
                                                <span style={badge('#2DD4BF', 'rgba(45,212,191,.08)', 'rgba(45,212,191,.2)')}>{task.deadline}</span>
                                            </div>
                                        </div>
                                        <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 12, color: task.cl >= 7 ? '#F87171' : task.cl >= 4 ? '#F0A500' : '#3FB950', marginLeft: 'auto', flexShrink: 0, paddingTop: 2 }}>
                                            CL {task.cl}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {/* Empty output state */}
                    {tab === "output" && !busy && !done && (
                        <div style={{ textAlign: 'center', padding: '48px 24px', color: '#484F58', fontFamily: "'DM Mono',monospace", fontSize: 11 }}>
                            <div style={{ fontSize: 28, marginBottom: 10, opacity: .3 }}>⟐</div>
                            No tasks yet — fill the form, upload files, and hit Generate.
                        </div>
                    )}
                </div>
            </div>
        );
}
    </script>
</body>

</html>
